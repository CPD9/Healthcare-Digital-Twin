<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f6fa"/>
    </radialGradient>
    <radialGradient id="outerRing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8ecff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#b0e0f8" stop-opacity="0.4"/>
      <stop offset="82%" stop-color="#8ecbe8" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#70b8d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="midRing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0"/>
      <stop offset="55%" stop-color="#ffc870" stop-opacity="0.35"/>
      <stop offset="78%" stop-color="#f0a040" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e08030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="40%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffb060"/>
      <stop offset="35%" stop-color="#f08030"/>
      <stop offset="65%" stop-color="#c85818"/>
      <stop offset="100%" stop-color="#8c3a08"/>
    </radialGradient>
    <filter id="glow-lg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
    <filter id="glow-md" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow-sm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow-core" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="100" height="100" fill="url(#bg)"/>

  <!-- Outermost diffuse halo -->
  <circle cx="50" cy="50" r="47" fill="url(#outerRing)" filter="url(#glow-lg)"/>

  <!-- Orbit rings (crisp, light gray) -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#c8dce8" stroke-width="0.45" opacity="0.55"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#b8d0e0" stroke-width="0.45" opacity="0.6"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#a8c4d8" stroke-width="0.45" opacity="0.65"/>
  <circle cx="50" cy="50" r="27" fill="none" stroke="#98b8d0" stroke-width="0.45" opacity="0.7"/>

  <!-- Blue glow band -->
  <circle cx="50" cy="50" r="38" fill="url(#outerRing)" opacity="0.75" filter="url(#glow-md)"/>

  <!-- Orbit rings (inner) -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#c09060" stroke-width="0.4" opacity="0.65"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#c08040" stroke-width="0.4" opacity="0.6"/>

  <!-- Warm mid glow band -->
  <circle cx="50" cy="50" r="21" fill="url(#midRing)" opacity="0.8" filter="url(#glow-sm)"/>

  <!-- Core warm halo -->
  <circle cx="50" cy="50" r="13" fill="#f09040" opacity="0.3" filter="url(#glow-sm)"/>

  <!-- Core -->
  <circle cx="50" cy="50" r="11" fill="url(#core)" filter="url(#glow-core)"/>

  <!-- Specular highlight -->
  <circle cx="46.5" cy="46.5" r="3.5" fill="white" opacity="0.45"/>
</svg>